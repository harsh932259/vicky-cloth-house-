
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Review Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2 id="title">Rate Us ⭐</h2>

<p id="subtitle">Choose a review and press Post</p>

<div class="language-buttons">

<button onclick="setLanguage('en')">English</button>

<button onclick="setLanguage('hi')">Hindi</button>

<button onclick="setLanguage('mr')">Punjabi</button>

</div>

<div id="reviews"></div>

<button id="loadMoreBtn" onclick="loadMore()">
Load More Reviews
</button>

</div>

<script src="script.js"></script>

</body>

</html>
